<script>
const $ = id => document.getElementById(id);
const app = $('app');

function el(tag, cls, html) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html) e.innerHTML = html;
  return e;
}

async function fetchJSON(url) {
  const r = await fetch(url);
  return r.json();
}

    fetchJSON('/health'),
    fetchJSON('/worm')

      <div style="display:flex;flex-direction:column;gap:2px;font-size:11px">

        <div style="text-align:center;color:var(--dim)">▼</div>

        </div>
        <div style="text-align:center;color:var(--dim)">▼</div>
        <div style="padding:10px 14px;border:1px solid var(--border);background:var(--surface);text-align:center;color:var(--warn)">
          LEAN 4 PROOFS — 7 proven, 2 sorry, 5 axioms
        </div>
        <div style="text-align:center;color:var(--dim)">▼</div>

    </div>`;

        <div>&nbsp;&nbsp;&nbsp;&nbsp;<span class="json">task.json</span> <span style="color:var(--dim)">— 60 lines, Task schema</span></div>

        <div>&nbsp;&nbsp;&nbsp;&nbsp;<span class="dir">src/</span></div>

        <div>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="ts">agent-keys.ts</span> <span style="color:var(--dim)">— 132 lines, Ed25519</span></div>

        <div>&nbsp;&nbsp;&nbsp;&nbsp;<span class="md">FINDINGS.md</span> <span style="color:var(--dim)">— 61 lines, 25 findings</span></div>
        <div>&nbsp;&nbsp;&nbsp;&nbsp;<span class="md">FINAL_REPORT.md</span> <span style="color:var(--dim)">— 144 lines</span></div>

init();
