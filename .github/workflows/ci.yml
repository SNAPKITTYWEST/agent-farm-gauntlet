name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Verify WORM chain
        run: node scripts/verify-chain.js

      - name: Run doctor
        run: node scripts/doctor.js

  docker:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t agent-farm-gauntlet .

      - name: Verify Docker healthcheck
        run: |
          docker run -d --name test -p 3847:3847 agent-farm-gauntlet
          sleep 5
          curl -f http://127.0.0.1:3847/health || exit 1
          docker stop test

  lean:
    runs-on: ubuntu-latest
    needs: build-and-test
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Verify proofs exist
        run: |
          ls -la proofs/*.lean
          echo "Note: Lean 4 compilation requires full toolchain. This step verifies files exist."

      - name: Compile proofs (optional)
        run: |
          cd proofs
          lean TrustDeed.lean 2>/dev/null || echo "TrustDeed.lean: contains sorry (expected)"
          lean TaskInvariants.lean 2>/dev/null || echo "TaskInvariants.lean: contains sorry (expected)"
          lean LedgerChain.lean 2>/dev/null || echo "LedgerChain.lean: contains sorry (expected)"
        continue-on-error: true
